<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple To-do List</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
    h1 { text-align: center; color: #333; }
    input { width: 70%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 15px; font-size: 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
    ul { list-style: none; padding: 0; margin-top: 20px; }
    li { padding: 10px; background: #f4f4f4; margin: 5px 0; border-radius: 4px; display: flex; justify-content: space-between; }
    .delete { background: red; color: white; border: none; cursor: pointer; border-radius: 4px; padding: 5px 10px; }
  </style>
</head>
<body>
  <h1>Simple To-do List</h1>
  <input type="text" id="taskInput" placeholder="Enter a task...">
  <button onclick="addTask()">Add</button>
  <ul id="taskList"></ul>

  <script>
    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      const li = document.createElement('li');
      li.innerHTML = `${text} <button class="delete" onclick="this.parentElement.remove()">Delete</button>`;
      document.getElementById('taskList').appendChild(li);
      input.value = '';
    }
  </script>
</body>
</html>
